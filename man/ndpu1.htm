<H1>PC-9801U-01 (8087 8MHz)</H1>
<H3>C8087-2 + ボード (G9XBR)</H3>
<HR><H3><PRE>
PC-9801U2用として発売されたコプロセッサ
8087はドーターボード上に実装済
CPUボードのV30を抜いてドーターボード上に装着、
V30用ソケットにドーターボードを挿入する

ドーターボード上の2x2ジャンパピン3A1, 2A2の
ショートジャンパはどちらも1-3ショート,2-4オープンがデフォルト

(メモリスイッチの設定も必要)
</PRE></H3>
